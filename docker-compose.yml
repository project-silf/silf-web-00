name: ${COMPOSE_PROJECT_NAME:-silf-web-00}

services:
  web:
    image: silf-web:${WEB_IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUN_VERSION: ${BUN_VERSION:-1.3.14}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Silf}
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "${WEB_PORT:-3010}:3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const r = await fetch('http://127.0.0.1:3000/api/health'); if (!r.ok) process.exit(1);",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
